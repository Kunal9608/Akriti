<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Revenue — Akriti Diagnostics Center</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">

  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/skeleton.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <script src="/assets/js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .chart-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .chart-title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 600; }
    .rev-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    @media(max-width:900px){ .rev-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar"></nav>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-heading" id="topbar-title">Revenue</h1>
      </div>
    </header>
    <div class="offline-banner" role="status"></div>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h2 class="page-title">Revenue Analytics</h2>
          <p class="page-subtitle">Daily and monthly revenue trends, payment split</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-ghost btn-sm" id="export-csv-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export CSV
          </button>
        </div>
      </div>

      <!-- Daily chart controls -->
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title">Daily Revenue</div>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="date" class="form-input" id="daily-from" style="height:34px;font-size:13px;width:140px">
            <input type="date" class="form-input" id="daily-to" style="height:34px;font-size:13px;width:140px">
            <button class="btn btn-secondary btn-sm" id="daily-refresh">Refresh</button>
          </div>
        </div>
        <div class="skel skel-chart" id="daily-skel"></div>
        <canvas id="daily-chart" style="display:none;max-height:260px"></canvas>
        <div id="daily-total" class="text-muted text-sm mt-4"></div>
      </div>

      <div class="rev-grid">
        <!-- Monthly chart -->
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">Monthly Revenue</div>
            <select class="form-select" id="monthly-year" style="height:34px;font-size:13px;width:90px"></select>
          </div>
          <div class="skel skel-chart" id="monthly-skel"></div>
          <canvas id="monthly-chart" style="display:none;max-height:220px"></canvas>
        </div>

        <!-- Payment split -->
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">Payment Split</div>
          </div>
          <div class="skel skel-chart" id="split-skel"></div>
          <canvas id="split-chart" style="display:none;max-height:220px"></canvas>
          <div id="split-detail" class="text-sm text-muted mt-4"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="/assets/js/toast.js"></script>
<script src="/assets/js/modal.js"></script>
<script src="/assets/js/cache-manager.js"></script>
<script src="/assets/js/api-client.js"></script>
<script src="/assets/js/shell.js"></script>
<script>
(async function() {
  await Shell.init({ role: 'admin', pageTitle: 'Revenue' });

  const today    = new Date();
  const fmtDate  = d => d.toISOString().split('T')[0];
  const from30   = new Date(today); from30.setDate(today.getDate() - 29);

  document.getElementById('daily-from').value = fmtDate(from30);
  document.getElementById('daily-to').value   = fmtDate(today);

  // Populate year selector
  const yearSel = document.getElementById('monthly-year');
  for (let y = today.getFullYear(); y >= today.getFullYear() - 4; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    yearSel.appendChild(opt);
  }

  let dailyChart, monthlyChart, splitChart;

  // ── Daily Revenue ─────────────────────────────────────────────────────────
  async function loadDaily() {
    const from = document.getElementById('daily-from').value;
    const to   = document.getElementById('daily-to').value;
    if (!from || !to) return;
    document.getElementById('daily-skel').style.display = '';
    document.getElementById('daily-chart').style.display = 'none';
    try {
      const rev = await API.get(`/api/v1/revenue/daily?from=${from}&to=${to}`);
      document.getElementById('daily-skel').style.display = 'none';
      const canvas = document.getElementById('daily-chart');
      canvas.style.display = '';
      if (dailyChart) dailyChart.destroy();
      dailyChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: rev.data.map(d => { const dt = new Date(d.period); return dt.toLocaleDateString('en-IN', {day:'2-digit',month:'short'}); }),
          datasets: [{
            label: 'Revenue',
            data: rev.data.map(d => d.revenue),
            backgroundColor: 'rgba(154,0,2,0.75)',
            borderRadius: 4,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { ticks: { callback: v => '₹' + v.toLocaleString('en-IN') } } },
        },
      });
      document.getElementById('daily-total').textContent = `Total for period: ${formatCurrency(rev.total)} across ${rev.data.length} days`;
    } catch { document.getElementById('daily-skel').style.display = 'none'; Toast.show('Failed to load daily revenue', 'error'); }
  }

  // ── Monthly Revenue ───────────────────────────────────────────────────────
  async function loadMonthly() {
    const year = parseInt(document.getElementById('monthly-year').value);
    document.getElementById('monthly-skel').style.display = '';
    document.getElementById('monthly-chart').style.display = 'none';
    try {
      const rev = await API.get(`/api/v1/revenue/monthly?year=${year}`);
      document.getElementById('monthly-skel').style.display = 'none';
      const canvas = document.getElementById('monthly-chart');
      canvas.style.display = '';
      if (monthlyChart) monthlyChart.destroy();
      monthlyChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: rev.data.map(d => d.period),
          datasets: [{
            label: 'Revenue',
            data: rev.data.map(d => d.revenue),
            backgroundColor: 'rgba(154,0,2,0.75)',
            borderRadius: 4,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { ticks: { callback: v => '₹' + v.toLocaleString('en-IN') } } },
        },
      });
    } catch { document.getElementById('monthly-skel').style.display = 'none'; }
  }

  // ── Payment Split ─────────────────────────────────────────────────────────
  async function loadSplit() {
    const from = document.getElementById('daily-from').value || fmtDate(from30);
    const to   = document.getElementById('daily-to').value || fmtDate(today);
    document.getElementById('split-skel').style.display = '';
    document.getElementById('split-chart').style.display = 'none';
    try {
      const split = await API.get(`/api/v1/revenue/payment-split?from=${from}&to=${to}`);
      document.getElementById('split-skel').style.display = 'none';
      const canvas = document.getElementById('split-chart');
      canvas.style.display = '';
      if (splitChart) splitChart.destroy();
      splitChart = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: ['Cash', 'QR/UPI'],
          datasets: [{ data: [split.cash_amount, split.qr_amount], backgroundColor: ['#9A0002','#3D6B7D'], borderWidth: 0 }],
        },
        options: { responsive: true, cutout: '60%', plugins: { legend: { position: 'bottom' } } },
      });
      document.getElementById('split-detail').innerHTML = `
        Cash: <strong>${formatCurrency(split.cash_amount)}</strong> (${split.cash_count} txns) &nbsp;|&nbsp;
        QR: <strong>${formatCurrency(split.qr_amount)}</strong> (${split.qr_count} txns)
      `;
    } catch { document.getElementById('split-skel').style.display = 'none'; }
  }

  // ── Export CSV ─────────────────────────────────────────────────────────────
  document.getElementById('export-csv-btn').addEventListener('click', async () => {
    const from = document.getElementById('daily-from').value;
    const to   = document.getElementById('daily-to').value;
    const btn = document.getElementById('export-csv-btn');
    const origHtml = btn.innerHTML;
    btn.innerHTML = 'Exporting...';
    btn.disabled = true;
    try {
      // Use the new streaming export endpoint to avoid backend OOM on millions of rows
      const token = localStorage.getItem('akriti_token') || localStorage.getItem('token');
      const exportUrl = `/api/v1/patients/export?date_from=${from}&date_to=${to}`;
      
      const headers = {};
      if (token) headers['Authorization'] = `Bearer ${token}`;

      // We fetch the blob directly
      const res = await fetch(exportUrl, {
        credentials: 'include',
        headers
      });
      
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.detail || "Export failed");
      }
      
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `revenue_${from || 'all'}_to_${to || 'all'}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
    } catch (err) { 
      Toast.show(err.message || 'Failed to export', 'error'); 
    } finally {
      btn.innerHTML = origHtml;
      btn.disabled = false;
    }
  });

  document.getElementById('daily-refresh').addEventListener('click', () => { loadDaily(); loadSplit(); });
  yearSel.addEventListener('change', loadMonthly);

  loadDaily();
  loadMonthly();
  loadSplit();
})();
</script>
</body>
</html>
