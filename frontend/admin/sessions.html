<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Active Sessions — Akriti Diagnostics Center</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">

  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/skeleton.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <script src="/assets/js/theme.js"></script>
  <style>
    .sessions-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 28px;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar"></nav>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-heading" id="topbar-title">Active Sessions</h1>
      </div>
    </header>
    <div class="offline-banner" role="status"></div>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h2 class="page-title">All Active Sessions</h2>
          <p class="page-subtitle">Manage all active device sessions currently logged in to Akriti Diagnostics</p>
        </div>
      </div>

      <div class="sessions-card">
        <div id="sessions-table-container"></div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="/assets/js/toast.js"></script>
<script src="/assets/js/modal.js"></script>
<script src="/assets/js/cache-manager.js"></script>
<script src="/assets/js/api-client.js"></script>
<script src="/assets/js/table.js"></script>
<script src="/assets/js/shell.js"></script>
<script>
(async function() {
  await Shell.init({ role: 'admin', pageTitle: 'Active Sessions' });

  const table = new DataTable({
    containerId: 'sessions-table-container',
    columns: [
      { key: 'user_name',    label: 'User',         width: '180px', render: v => `<strong>${escapeHtml(v || '—')}</strong>` },
      { key: 'device_label', label: 'Device / Agent',               render: v => escapeHtml(v || 'Unknown device') },
      { key: 'ip_address',   label: 'IP Address',   width: '140px', render: v => `<span class="tabular">${escapeHtml(v || '—')}</span>` },
      { key: 'issued_at',    label: 'Login Time',   width: '180px', render: v => formatDateTime(v) },
      { key: null,           label: 'Action',       width: '100px', render: (_, row) => `
        <button class="btn btn-sm btn-danger" onclick="revokeSession('${row.id}')" style="background:var(--color-error);border-color:var(--color-error);color:#fff">Revoke</button>
      ` }
    ],
    fetchFn: async (params, options = {}) => {
      // API returns a list of sessions, DataTable expects { items, total, page, page_size }
      const sessions = await API.get('/api/v1/sessions/all');
      // Sort sessions by login time descending
      sessions.sort((a, b) => new Date(b.issued_at) - new Date(a.issued_at));
      
      const page = params.page || 1;
      const size = params.page_size || 25;
      const start = (page - 1) * size;
      const items = sessions.slice(start, start + size);
      
      return {
        items,
        total: sessions.length,
        page,
        page_size: size,
        total_pages: Math.ceil(sessions.length / size),
      };
    },
    pageSize: 25,
    emptyMessage: 'No active sessions found.',
  });
  table.load();

  window.revokeSession = async function(id) {
    const ok = await Modal.confirm('Revoke Session', 'This will immediately sign out that device. Continue?', { confirmText: 'Revoke', danger: true });
    if (!ok) return;
    try {
      await API.post(`/api/v1/sessions/${id}/revoke`, {});
      Toast.show('Session revoked', 'success');
      table.load();
    } catch {
      Toast.show('Failed to revoke session', 'error');
    }
  };
})();
</script>
</body>
</html>
