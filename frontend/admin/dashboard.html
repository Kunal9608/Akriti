<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Dashboard — Akriti Diagnostics Center</title>
  <meta name="description" content="Admin dashboard — KPIs, revenue charts, recent patients">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/skeleton.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <script src="/assets/js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px 24px; }
    .chart-title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 600; color: var(--color-ink); margin-bottom: 16px; }
    .recent-table-wrap { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
    .recent-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--color-border); }
    @media(max-width:900px){ .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" aria-label="Main navigation"></nav>

  <!-- Main area -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-heading" id="topbar-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" data-theme-toggle aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </header>

    <div class="offline-banner" role="status"></div>

    <main class="page-content">
      <!-- KPI Grid -->
      <div class="kpi-grid" id="kpi-grid">
        <!-- Skeleton -->
        <div class="kpi-card"><div class="skel-kpi-card"><span class="skel skel-label skel-w-12"></span><span class="skel skel-kpi skel-w-20"></span><span class="skel skel-label skel-w-8"></span></div></div>
        <div class="kpi-card"><div class="skel-kpi-card"><span class="skel skel-label skel-w-12"></span><span class="skel skel-kpi skel-w-16"></span><span class="skel skel-label skel-w-8"></span></div></div>
        <div class="kpi-card"><div class="skel-kpi-card"><span class="skel skel-label skel-w-12"></span><span class="skel skel-kpi skel-w-16"></span><span class="skel skel-label skel-w-8"></span></div></div>
        <div class="kpi-card"><div class="skel-kpi-card"><span class="skel skel-label skel-w-12"></span><span class="skel skel-kpi skel-w-16"></span><span class="skel skel-label skel-w-8"></span></div></div>
        <div class="kpi-card"><div class="skel-kpi-card"><span class="skel skel-label skel-w-12"></span><span class="skel skel-kpi skel-w-12"></span><span class="skel skel-label skel-w-8"></span></div></div>
        <div class="kpi-card"><div class="skel-kpi-card"><span class="skel skel-label skel-w-12"></span><span class="skel skel-kpi skel-w-20"></span><span class="skel skel-label skel-w-8"></span></div></div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Daily Revenue — Last 30 Days</div>
          <div class="skel skel-chart" id="revenue-skel"></div>
          <canvas id="revenue-chart" style="display:none; max-height:220px"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Payment Split</div>
          <div class="skel skel-chart" id="split-skel"></div>
          <canvas id="split-chart" style="display:none; max-height:220px"></canvas>
        </div>
      </div>

      <!-- Recent Patients -->
      <div class="recent-table-wrap">
        <div class="recent-header">
          <span class="font-display fw-600" style="font-size:var(--text-lg)">Recent Patients</span>
          <a href="/admin/patients.html" class="btn btn-ghost btn-sm">View all</a>
        </div>
        <div id="recent-patients-table"></div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>

<script src="/assets/js/toast.js"></script>
<script src="/assets/js/modal.js"></script>
<script src="/assets/js/cache-manager.js"></script>
<script src="/assets/js/api-client.js"></script>
<script src="/assets/js/table.js"></script>
<script src="/assets/js/offline-queue.js"></script>
<script src="/assets/js/shell.js"></script>
<script>
(async function() {
  await Shell.init({ role: 'admin', pageTitle: 'Dashboard' });

  // ── KPI Cards ─────────────────────────────────────────────────────────────
  function kpiCard(label, value, sub, icon) {
    return `
      <div class="kpi-card">
        <div class="kpi-label">${label}</div>
        <div class="kpi-value tabular">${value}</div>
        ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
      </div>
    `;
  }

  function renderKPIs(stats) {
    document.getElementById('kpi-grid').innerHTML =
      kpiCard('Today Revenue',      formatCurrency(stats.today_revenue),   'Cash + QR') +
      kpiCard('Today Patients',     stats.today_patients,                   'Registered today') +
      kpiCard('Pending Reports',    stats.pending_reports,                  'Awaiting upload') +
      kpiCard('Outstanding Due',    formatCurrency(stats.outstanding_due),  'Unpaid balances') +
      kpiCard('Monthly Revenue',    formatCurrency(stats.monthly_revenue),  'This month') +
      kpiCard('Doctor Commissions', formatCurrency(stats.monthly_doctor_commissions), 'This month') +
      kpiCard('Monthly Profit',     formatCurrency(stats.monthly_profit),   'Net profit');
  }

  window.addEventListener('cache-updated:/api/v1/finance/dashboard', e => renderKPIs(e.detail.data));

  try {
    const stats = await API.get('/api/v1/finance/dashboard');
    if (stats) renderKPIs(stats);
  } catch {
    document.getElementById('kpi-grid').innerHTML = `<div class="text-muted text-sm" style="grid-column:1/-1;padding:20px">Failed to load KPIs</div>`;
  }

  // ── Revenue Chart ─────────────────────────────────────────────────────────
  try {
    const today = new Date();
    const from  = new Date(today); from.setDate(today.getDate() - 29);
    const fmtDate = d => d.toISOString().split('T')[0];
    const rev = await API.get(`/api/v1/revenue/daily?from=${fmtDate(from)}&to=${fmtDate(today)}`);

    document.getElementById('revenue-skel').style.display = 'none';
    const canvas = document.getElementById('revenue-chart');
    canvas.style.display = '';

    new Chart(canvas, {
      type: 'line',
      data: {
        labels: rev.data.map(d => {
          const dt = new Date(d.period);
          return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
        }),
        datasets: [{
          label: 'Revenue',
          data: rev.data.map(d => d.revenue),
          borderColor: '#9A0002',
          backgroundColor: 'rgba(154,0,2,0.07)',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#9A0002',
          fill: true,
          tension: 0.3,
        }],
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { ticks: { callback: v => '₹' + v.toLocaleString('en-IN') } },
          x: { ticks: { maxTicksLimit: 10 } },
        },
      },
    });
  } catch { document.getElementById('revenue-skel').style.display = 'none'; }

  // ── Payment Split Chart ───────────────────────────────────────────────────
  try {
    const today = new Date();
    const from  = new Date(today); from.setDate(1);
    const fmtDate = d => d.toISOString().split('T')[0];
    const split = await API.get(`/api/v1/revenue/payment-split?from=${fmtDate(from)}&to=${fmtDate(today)}`);

    document.getElementById('split-skel').style.display = 'none';
    const canvas = document.getElementById('split-chart');
    canvas.style.display = '';

    new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: ['Cash', 'QR / UPI'],
        datasets: [{
          data: [split.cash_amount, split.qr_amount],
          backgroundColor: ['#9A0002', '#3D6B7D'],
          borderWidth: 0,
        }],
      },
      options: {
        responsive: true,
        cutout: '65%',
        plugins: {
          legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 12 } } },
        },
      },
    });
  } catch { document.getElementById('split-skel').style.display = 'none'; }

  // ── Recent Patients ───────────────────────────────────────────────────────
  const recentTable = new DataTable({
    containerId: 'recent-patients-table',
    columns: [
      { key: 'patient_code', label: 'Patient ID', width: '110px' },
      { key: 'name',         label: 'Name' },
      { key: 'mobile',       label: 'Mobile',    width: '120px' },
      { key: 'status',       label: 'Status',    width: '130px', render: v => statusBadge(v) },
      { key: 'amount_paid',  label: 'Paid',      width: '100px', render: v => `<span class="tabular">${formatCurrency(v)}</span>` },
      { key: 'created_at',   label: 'Date',      width: '120px', render: v => formatDate(v) },
    ],
    fetchFn: async (params, options = {}) => {
      const res = await API.get('/api/v1/patients?page=1&page_size=8');
      return { items: res.items || [], total: res.total || 0 };
    },
    pageSize: 8,
    emptyMessage: 'No patients registered yet',
  });
  recentTable.load();
})();
</script>
</body>
</html>
