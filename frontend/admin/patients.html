<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Patients — Akriti Diagnostics Center</title>
  <meta name="description" content="Manage all registered patients — search, filter, view details and upload reports.">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/skeleton.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <script src="/assets/js/theme.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* ── Slide Panel ────────────────────────────────────────────────────────── */
    .slide-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 460px;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      box-shadow: -8px 0 40px rgba(0,0,0,.12);
      z-index: 500;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
    }
    .slide-panel.open { transform: none; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--color-cherry-cola-tint-10) 0%, transparent 60%);
    }
    .panel-title-wrap { display: flex; flex-direction: column; gap: 2px; }
    .panel-title { font-family: var(--font-display); font-size: var(--text-xl); font-weight: 700; color: var(--color-ink); }
    .panel-subtitle { font-size: var(--text-xs); color: var(--color-ink-muted); font-weight: 500; }
    .panel-body { flex: 1; overflow-y: auto; padding: 24px; }
    .panel-overlay { display: none; position: fixed; inset: 0; background: rgba(10,5,5,0.45); backdrop-filter: blur(3px); z-index: 490; }
    .panel-overlay.open { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } }

    /* ── Patient Detail Rows ─────────────────────────────────────────────── */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .detail-item { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 10px 14px; }
    .detail-item-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink-faint); margin-bottom: 3px; }
    .detail-item-value { font-size: var(--text-sm); font-weight: 600; color: var(--color-ink); }
    .detail-item.full-width { grid-column: 1 / -1; }
    .detail-item.accent { border-left: 3px solid var(--color-cherry-cola); }
    .detail-item.discount-item { border-left: 3px solid #3D6B7D; }

    /* ── Billing Summary Card ─────────────────────────────────────────────── */
    .billing-summary {
      background: linear-gradient(135deg, var(--color-cherry-cola) 0%, #6D0001 100%);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      color: #fff;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .billing-stat { text-align: center; }
    .billing-stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.75; margin-bottom: 4px; }
    .billing-stat-value { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; font-variant-numeric: tabular-nums; }
    .billing-stat + .billing-stat { border-left: 1px solid rgba(255,255,255,0.2); }

    /* ── Timeline ─────────────────────────────────────────────────────────── */
    .timeline { margin-top: 8px; }

    /* ── Discount badge in table ─────────────────────────────────────────── */
    .discount-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 2px 7px;
      border-radius: var(--radius-pill);
      background: rgba(61,107,125,0.12); color: #3D6B7D;
      white-space: nowrap;
    }
    html[data-theme="dark"] .discount-chip { background: rgba(61,107,125,0.22); color: #7DB8CB; }

    /* ── Page header banner ──────────────────────────────────────────────── */
    .patients-header-banner {
      background: linear-gradient(135deg, var(--color-cherry-cola) 0%, #6D0001 100%);
      border-radius: var(--radius-lg);
      padding: 20px 28px;
      margin-bottom: 24px;
      color: #fff;
      display: flex; align-items: center; justify-content: space-between;
    }
    .patients-header-banner h2 { font-size: var(--text-2xl, 1.5rem); font-weight: 700; font-family: var(--font-display); margin: 0 0 4px; }
    .patients-header-banner p  { font-size: var(--text-sm); opacity: 0.8; margin: 0; }

    /* ── Filters bar improvements ────────────────────────────────────────── */
    .filters-bar-pro {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 12px 16px;
      margin-bottom: 20px;
    }

    /* ── Discount icon in action column ─────────────────────────────────── */
    .action-btns { display: flex; gap: 5px; align-items: center; }

    /* ── Report section in panel ─────────────────────────────────────────── */
    .report-card {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      margin-bottom: 8px;
      transition: box-shadow var(--transition-fast);
    }
    .report-card:hover { box-shadow: var(--shadow-sm); }
    .report-card-meta { display: flex; flex-direction: column; gap: 2px; }
    .report-card-name { font-size: 12px; font-weight: 600; color: var(--color-ink); word-break: break-all; }
    .report-card-sub  { font-size: 11px; color: var(--color-ink-faint); }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar"></nav>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-heading" id="topbar-title">Patients</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" data-theme-toggle aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </header>

    <div class="offline-banner" role="status"></div>

    <main class="page-content">
      <!-- Hero Header Banner -->
      <div class="patients-header-banner">
        <div>
          <h2>Patient Overview</h2>
          <p>All registered patients — search, filter, view details & manage reports</p>
        </div>
        <a href="/admin/add-patient" class="btn" style="background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.35);backdrop-filter:blur(8px);font-weight:600">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Patient
        </a>
      </div>

      <!-- Filters Bar -->
      <div class="filters-bar-pro">
        <div class="topbar-search" style="width:260px;flex-shrink:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-q" placeholder="Name, mobile, patient ID…" autocomplete="off">
        </div>
        <select class="form-select" id="filter-status" style="height:36px;min-width:150px;font-size:13px">
          <option value="">All Statuses</option>
          <option value="sample_collected">Collected</option>
          <option value="under_process">Processing</option>
          <option value="report_ready">Report Ready</option>
        </select>
        <input type="date" class="form-input" id="filter-from" style="height:36px;font-size:13px;width:150px" placeholder="From date">
        <input type="date" class="form-input" id="filter-to"   style="height:36px;font-size:13px;width:150px" placeholder="To date">
        <button class="btn btn-ghost btn-sm" id="clear-filters-btn" style="flex-shrink:0">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Clear
        </button>
      </div>

      <!-- Table -->
      <div id="patients-table-container"></div>
    </main>
  </div>
</div>

<!-- Patient Detail Slide Panel -->
<div class="panel-overlay" id="panel-overlay"></div>
<aside class="slide-panel" id="patient-panel" aria-label="Patient details">
  <div class="panel-header">
    <div class="panel-title-wrap">
      <div class="panel-title" id="panel-patient-name">Patient Details</div>
      <div class="panel-subtitle" id="panel-patient-code"></div>
    </div>
    <button class="btn btn-icon btn-ghost" id="panel-close-btn" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="panel-body" id="panel-body">
    <!-- Loaded dynamically -->
  </div>
</aside>

<div id="toast-container"></div>

<!-- Report Upload Modal -->
<div class="modal-backdrop" id="report-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="report-modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="report-modal-title">Upload Report</h2>
      <button class="modal-close" id="report-modal-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-field mb-4">
        <label class="form-label" for="report-patient-id">Patient</label>
        <input class="form-input" id="report-patient-id" disabled>
      </div>
      <div id="report-modal-payment-section"></div>
      <div class="form-field">
        <label class="form-label" for="report-file">
          Report File <span class="required">*</span>
          <span style="font-weight:400;color:var(--color-ink-faint);font-size:11px;margin-left:4px">(PDF, JPG, PNG, WEBP, BMP, TIFF — images auto-converted to PDF)</span>
        </label>
        <!-- Drop zone -->
        <div id="report-drop-zone" style="border:2px dashed var(--color-border);border-radius:var(--radius-md);padding:20px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;background:var(--color-bg)" onclick="document.getElementById('report-file').click()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--color-ink-faint)" stroke-width="1.5" stroke-linecap="round" style="margin:0 auto 8px;display:block"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div id="report-drop-label" style="font-size:13px;color:var(--color-ink-muted);font-weight:500">Click or drag & drop your report here</div>
          <div style="font-size:11px;color:var(--color-ink-faint);margin-top:4px">PDF · JPG · PNG · WEBP · BMP · TIFF · HEIC</div>
        </div>
        <input type="file" id="report-file" accept=".pdf,.jpg,.jpeg,.png,.webp,.bmp,.tiff,.tif,.heic,.heif" style="display:none">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('report-modal')">Cancel</button>
      <button class="btn btn-primary" id="report-upload-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Report
      </button>
    </div>
  </div>
</div>

<script src="/assets/js/toast.js"></script>
<script src="/assets/js/modal.js"></script>
<script src="/assets/js/api-client.js"></script>
<script src="/assets/js/table.js"></script>
<script src="/assets/js/offline-queue.js"></script>
<script src="/assets/js/shell.js"></script>
<script>
(async function() {
  await Shell.init({ role: 'admin', pageTitle: 'Patients' });

  let currentPatientId = null;

  // ── File drop zone ─────────────────────────────────────────────────────────
  const dropZone  = document.getElementById('report-drop-zone');
  const fileInput = document.getElementById('report-file');
  const dropLabel = document.getElementById('report-drop-label');

  function updateDropLabel(file) {
    if (file) {
      dropLabel.innerHTML = `<strong style="color:var(--color-ink)">${escapeHtml(file.name)}</strong> <span style="color:var(--color-success);font-size:12px">✓ Ready to upload</span>`;
      dropZone.style.borderColor = 'var(--color-success)';
      dropZone.style.background  = 'var(--color-success-tint)';
    } else {
      dropLabel.textContent = 'Click or drag & drop your report here';
      dropZone.style.borderColor = '';
      dropZone.style.background  = 'var(--color-bg)';
    }
  }

  fileInput.addEventListener('change', () => updateDropLabel(fileInput.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--color-cherry-cola)'; dropZone.style.background = 'var(--color-cherry-cola-tint-10)'; });
  dropZone.addEventListener('dragleave', () => updateDropLabel(fileInput.files[0]));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    const dt = e.dataTransfer;
    if (dt.files.length) {
      // Assign to the file input
      const dataTransfer = new DataTransfer();
      dataTransfer.items.add(dt.files[0]);
      fileInput.files = dataTransfer.files;
      updateDropLabel(fileInput.files[0]);
    }
  });

  // ── Patients Table ─────────────────────────────────────────────────────────
  const table = new DataTable({
    containerId: 'patients-table-container',
    columns: [
      { key: 'patient_code', label: 'Patient ID',    width: '110px', render: v => `<span class="tabular fw-600 text-primary">${escapeHtml(v)}</span>` },
      { key: 'name',         label: 'Name',                          render: (v, row) => `<div class="fw-600">${escapeHtml(v)}</div><div class="text-xs text-muted">${escapeHtml(row.mobile || '')}</div>` },
      { key: 'doctor_name',  label: 'Doctor',        width: '120px', render: v => `<span class="text-sm">${escapeHtml(v || 'Self')}</span>` },
      { key: 'status',       label: 'Status',        width: '130px', render: v => statusBadge(v) },
      { key: 'total_amount', label: 'Paid / Total',  width: '160px', render: (v, row) => {
          const disc = parseFloat(row.discount_amount || 0);
          const net  = Math.max(0, parseFloat(v || 0) - disc);
          if (disc > 0) {
            return `
              <div class="tabular fw-600">${formatCurrency(net)}</div>
              <div style="display:flex;align-items:center;gap:4px;margin-top:2px">
                <span style="font-size:11px;color:var(--color-ink-faint);text-decoration:line-through">${formatCurrency(v)}</span>
                <span class="discount-chip" title="Discount: ${formatCurrency(disc)}">
                  <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                  -${formatCurrency(disc)}
                </span>
              </div>`;
          }
          return `<span class="tabular fw-600">${formatCurrency(v)}</span>`;
        }
      },
      { key: 'amount_paid',  label: 'Paid / Due',    width: '140px', render: (v, row) => {
          const due = parseFloat(row.amount_due || 0);
          const dueColor = due > 0 ? 'var(--color-error)' : 'var(--color-success)';
          return `<div class="tabular">${formatCurrency(v)}</div><div style="font-size:11px;color:${dueColor};font-weight:600">${due > 0 ? 'Due: ' + formatCurrency(due) : '✓ Fully Paid'}</div>`;
        }
      },
      { key: 'created_at',   label: 'Date',          width: '110px', render: v => formatDate(v) },
      { key: null,           label: 'Actions',       width: '145px', render: (_, row) => `
        <div class="action-btns">
          <button class="btn btn-sm btn-ghost" onclick="openPanel('${row.id}','${escapeHtml(row.name)}','${escapeHtml(row.patient_code)}')">View</button>
          <button class="btn btn-sm btn-secondary" onclick="openReportModal('${row.id}','${escapeHtml(row.patient_code)}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Report
          </button>
        </div>
      ` },
    ],
    fetchFn: async (params) => {
      const qs = new URLSearchParams({
        page: params.page, page_size: params.page_size,
        ...(params.q        && { q: params.q }),
        ...(params.status   && { status: params.status }),
        ...(params.date_from && { date_from: params.date_from }),
        ...(params.date_to   && { date_to:   params.date_to }),
      });
      return await API.get(`/api/v1/patients?${qs}`);
    },
    pageSize: 25,
    emptyMessage: 'No patients found matching your filters',
  });
  table.load();

  // ── Filters ───────────────────────────────────────────────────────────────
  let searchTimer;
  document.getElementById('search-q').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { table.setFilter('q', e.target.value); table.load(); }, 400);
  });
  document.getElementById('filter-status').addEventListener('change', e => { table.setFilter('status', e.target.value); table.load(); });
  document.getElementById('filter-from').addEventListener('change', e => { table.setFilter('date_from', e.target.value); table.load(); });
  document.getElementById('filter-to').addEventListener('change', e => { table.setFilter('date_to', e.target.value); table.load(); });
  document.getElementById('clear-filters-btn').addEventListener('click', () => {
    ['search-q','filter-status','filter-from','filter-to'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    table.filters = {};
    table.load();
  });

  // ── Patient Panel ─────────────────────────────────────────────────────────
  window.openPanel = async function(id, name, code) {
    currentPatientId = id;
    document.getElementById('panel-patient-name').textContent = name;
    document.getElementById('panel-patient-code').textContent = code || '';
    document.getElementById('panel-body').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        ${[1,2,3,4].map(() => `<div class="detail-item"><span class="skel skel-text" style="width:60%"></span><span class="skel skel-text" style="width:80%;margin-top:4px"></span></div>`).join('')}
      </div>
      <div class="skel skel-chart" style="height:80px;margin-bottom:16px"></div>
      <div class="skel-timeline">
        ${[1,2,3].map(() => `<div class="skel-timeline-item"><span class="skel skel-avatar skel-timeline-dot"></span><div class="skel-timeline-content"><span class="skel skel-text skel-w-16"></span><span class="skel skel-text-xs skel-w-20"></span></div></div>`).join('')}
      </div>`;
    document.getElementById('patient-panel').classList.add('open');
    document.getElementById('panel-overlay').classList.add('open');

    try {
      const p = await API.get(`/api/v1/patients/${id}`);
      const tests = (p.tests || []).map(t => `<span class="badge badge-neutral" style="margin:2px">${escapeHtml(t.name)}</span>`).join('');

      const disc = parseFloat(p.discount_amount || 0);
      const netPayable = Math.max(0, parseFloat(p.total_amount || 0) - disc);

      let reportSectionHtml = '';
      let latestReportUrl = null;
      if (p.status === 'report_ready') {
        try {
          const reports = await API.get(`/api/v1/reports/${id}`, { silent: true });
          if (reports && reports.length > 0) {
            reports.sort((a, b) => b.version - a.version);
            latestReportUrl = `/api/v1/reports/download/${reports[0].id}`;
            reportSectionHtml = `
              <div class="divider"></div>
              <div style="font-size:var(--text-base);font-weight:600;color:var(--color-ink);margin-bottom:12px">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Available Reports
              </div>
              ${reports.map(r => `
                <div class="report-card">
                  <div class="report-card-meta">
                    <div class="report-card-name">${escapeHtml(r.filename)}</div>
                    <div class="report-card-sub">v${r.version} · ${formatDateTime(r.uploaded_at)}<br>Uploaded by: ${escapeHtml(r.uploaded_by_name || 'Unknown')}</div>
                  </div>
                  <a href="/api/v1/reports/download/${r.id}" target="_blank" class="btn btn-sm btn-secondary" style="flex-shrink:0;height:30px;gap:5px">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    View
                  </a>
                </div>
              `).join('')}
            `;
          }
        } catch (_) {}
      }

      // Build billing summary card
      const billingHtml = `
        <div class="billing-summary">
          <div class="billing-stat">
            <div class="billing-stat-label">Total Bill</div>
            <div class="billing-stat-value">${formatCurrency(p.total_amount)}</div>
          </div>
          <div class="billing-stat">
            <div class="billing-stat-label">${disc > 0 ? 'Net Payable' : 'Amount Paid'}</div>
            <div class="billing-stat-value">${disc > 0 ? formatCurrency(netPayable) : formatCurrency(p.amount_paid)}</div>
          </div>
          <div class="billing-stat">
            <div class="billing-stat-label">${parseFloat(p.amount_due || 0) > 0 ? 'Due' : 'Status'}</div>
            <div class="billing-stat-value">${parseFloat(p.amount_due || 0) > 0 ? formatCurrency(p.amount_due) : '✓ Paid'}</div>
          </div>
        </div>
        ${disc > 0 ? `
          <div class="detail-item discount-item" style="margin-bottom:12px">
            <div class="detail-item-label">🏷️ Discount Applied</div>
            <div class="detail-item-value" style="color:#3D6B7D">${formatCurrency(disc)} off</div>
          </div>
        ` : ''}
      `;

      document.getElementById('panel-body').innerHTML = `
        <!-- Billing Banner -->
        ${billingHtml}

        <!-- Detail Grid -->
        <div class="detail-grid">
          <div class="detail-item accent">
            <div class="detail-item-label">Patient ID</div>
            <div class="detail-item-value tabular text-primary">${escapeHtml(p.patient_code)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Age / Gender</div>
            <div class="detail-item-value">${p.age} yrs · ${p.gender}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Mobile</div>
            <div class="detail-item-value tabular">${escapeHtml(p.mobile)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Doctor</div>
            <div class="detail-item-value">${escapeHtml(p.doctor_name || 'Self')}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Sample Date</div>
            <div class="detail-item-value">${formatDate(p.sample_date)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">${p.report_released_at ? 'Report Released' : 'Report Due'}</div>
            <div class="detail-item-value">${p.report_released_at ? formatDate(p.report_released_at) : formatDate(p.estimated_report_date)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Payment Mode</div>
            <div class="detail-item-value">${p.payment_mode ? p.payment_mode.toUpperCase() : '—'}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Status</div>
            <div class="detail-item-value">${statusBadge(p.status)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Sample Collected By</div>
            <div class="detail-item-value">${escapeHtml(p.collected_by_name || 'Unknown')}</div>
          </div>
          <div class="detail-item full-width">
            <div class="detail-item-label">Tests Booked</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${tests}</div>
          </div>
          ${p.processing_note ? `<div class="detail-item full-width"><div class="detail-item-label">Processing Note</div><div class="detail-item-value" style="font-weight:400">${escapeHtml(p.processing_note)}</div></div>` : ''}
        </div>

        ${reportSectionHtml}

        <!-- Timeline -->
        <div class="divider"></div>
        <div style="font-size:var(--text-base);font-weight:600;color:var(--color-ink);margin-bottom:16px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Timeline
        </div>
        <div class="timeline">
          <div class="timeline-item">
            <div class="timeline-dot done"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div class="timeline-body"><div class="timeline-title">Patient Registered</div><div class="timeline-time">${formatDateTime(p.created_at)}</div></div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot ${['under_process','report_ready'].includes(p.status) ? 'done' : ''}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
            </div>
            <div class="timeline-body"><div class="timeline-title">Sample Collected</div><div class="timeline-time">${formatDate(p.sample_date)}</div></div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot ${p.status === 'report_ready' ? 'done' : ''}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="timeline-body">
              <div class="timeline-title">
                ${latestReportUrl
                  ? `<a href="${latestReportUrl}" target="_blank" style="color:var(--color-primary);text-decoration:underline;cursor:pointer;display:inline-flex;align-items:center;gap:5px">Report Ready <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`
                  : 'Report Ready'
                }
              </div>
              <div class="timeline-time">${p.status === 'report_ready' ? 'Completed' : 'Pending'}</div>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div style="display:flex;gap:8px;margin-top:24px">
          <a href="/admin/add-patient?id=${p.id}" class="btn btn-secondary" style="flex:1">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit Patient
          </a>
          <button class="btn btn-primary" style="flex:1" onclick="openReportModal('${p.id}','${escapeHtml(p.patient_code)}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload Report
          </button>
        </div>
      `;
    } catch (err) {
      document.getElementById('panel-body').innerHTML = `<p class="text-muted">Failed to load patient details.</p>`;
    }
  };

  function closePanel() {
    document.getElementById('patient-panel').classList.remove('open');
    document.getElementById('panel-overlay').classList.remove('open');
  }
  document.getElementById('panel-close-btn').addEventListener('click', closePanel);
  document.getElementById('panel-overlay').addEventListener('click', closePanel);

  // ── Report Upload ─────────────────────────────────────────────────────────
  window.openReportModal = async function(id, code) {
    currentPatientId = id;
    document.getElementById('report-patient-id').value = code;
    // Reset file drop zone
    fileInput.value = '';
    updateDropLabel(null);

    const paySec = document.getElementById('report-modal-payment-section');
    paySec.innerHTML = `<p class="text-xs text-muted" style="padding:10px 0">Loading billing info...</p>`;

    Modal.open('report-modal');

    try {
      const p = await API.get(`/api/v1/patients/${id}`, { silent: true });
      const total = parseFloat(p.total_amount || 0);
      const discount = parseFloat(p.discount_amount || 0);
      const paid = parseFloat(p.amount_paid || 0);
      const netPayable = Math.max(0, total - discount);
      paySec.dataset.netPayable = netPayable;
      const due = Math.max(0, netPayable - paid);

      if (due > 0) {
        paySec.innerHTML = `
          <div class="mb-4" style="background:var(--color-cherry-cola-tint-10);border:1px solid var(--color-cherry-cola);border-radius:var(--radius-md);padding:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <span style="font-size:13px;color:var(--color-ink);font-weight:600">Remaining Due Amount:</span>
              <span class="fw-700" style="color:var(--color-cherry-cola);font-size:16px">${formatCurrency(due)}</span>
            </div>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;user-select:none;margin-bottom:8px">
              <input type="checkbox" id="complete-payment-chk">
              <strong>Record payment completion now</strong>
            </label>
            <div id="modal-payment-inputs" style="display:none;margin-top:12px;border-top:1px dashed var(--color-border);padding-top:12px">
              <div class="form-field mb-3">
                <label class="form-label" for="modal-payment-mode">Payment Mode</label>
                <select class="form-select" id="modal-payment-mode">
                  <option value="cash">Cash</option>
                  <option value="qr">QR / UPI</option>
                </select>
              </div>
              <div id="modal-qr-container" style="display:none;text-align:center;padding:12px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md)">
                <div id="modal-qr-canvas" style="display:inline-block"></div>
                <p class="text-xs text-faint mt-2" style="margin-bottom:0">Scan to pay remaining ₹${due}</p>
              </div>
            </div>
          </div>
        `;

        const chk = document.getElementById('complete-payment-chk');
        const inputs = document.getElementById('modal-payment-inputs');
        const mode = document.getElementById('modal-payment-mode');
        const qrCont = document.getElementById('modal-qr-container');
        const qrCanvas = document.getElementById('modal-qr-canvas');

        chk.addEventListener('change', () => {
          inputs.style.display = chk.checked ? '' : 'none';
          if (chk.checked) triggerModalQR();
        });

        mode.addEventListener('change', triggerModalQR);

        let labSettings = null;
        async function triggerModalQR() {
          if (mode.value === 'qr' && chk.checked) {
            qrCont.style.display = '';
            qrCanvas.innerHTML = '';
            if (!labSettings) {
              try { labSettings = await API.get('/api/v1/settings/lab', { silent: true }); } catch {}
            }
            const vpa = labSettings?.lab_upi_vpa || 'akriti@upi';
            const name = labSettings?.lab_name || 'Akriti Diagnostics';
            const upiString = `upi://pay?pa=${encodeURIComponent(vpa)}&pn=${encodeURIComponent(name)}&am=${due.toFixed(2)}&cu=INR`;
            if (typeof QRCode !== 'undefined') {
              new QRCode(qrCanvas, { text: upiString, width: 150, height: 150, colorDark: '#1a1a1a', colorLight: '#ffffff' });
            } else {
              qrCanvas.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(upiString)}" width="150" height="150">`;
            }
          } else {
            qrCont.style.display = 'none';
          }
        }
      } else {
        paySec.innerHTML = `<p class="text-xs mb-4" style="color:var(--color-success);display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Payment completed in full.</p>`;
      }
    } catch {
      paySec.innerHTML = `<p class="text-xs text-muted mb-4">Could not load patient payment status.</p>`;
    }
  };

  document.getElementById('report-modal-close').addEventListener('click', () => Modal.close('report-modal'));

  document.getElementById('report-upload-btn').addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) { Toast.show('Please select a report file', 'warning'); return; }

    const btn = document.getElementById('report-upload-btn');
    btn.setAttribute('aria-busy','true'); btn.innerHTML = `<span class="btn-loading-spinner"></span> Uploading...`;

    // Process payment if checked
    const chk = document.getElementById('complete-payment-chk');
    if (chk && chk.checked) {
      const mode       = document.getElementById('modal-payment-mode').value;
      const netPayable = parseFloat(document.getElementById('report-modal-payment-section').dataset.netPayable || 0);
      try {
        await API.patch(`/api/v1/patients/${currentPatientId}`, { amount_paid: netPayable, payment_mode: mode });
        Toast.show('Payment marked as completed', 'success');
      } catch (err) {
        Toast.show(err.message || 'Failed to complete payment', 'error');
        btn.removeAttribute('aria-busy');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload Report`;
        return;
      }
    }

    try {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch(`/api/v1/reports/${currentPatientId}`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Idempotency-Key': API.uuidv4() },
        body: fd,
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.detail || 'Upload failed');
      }
      Modal.close('report-modal');
      Toast.show('Report uploaded successfully', 'success');
      table.refresh();
      if (document.getElementById('patient-panel').classList.contains('open')) {
        openPanel(currentPatientId, document.getElementById('panel-patient-name').textContent, document.getElementById('panel-patient-code').textContent);
      }
    } catch (err) {
      Toast.show(err.message || 'Failed to upload report', 'error');
    } finally {
      btn.removeAttribute('aria-busy');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload Report`;
    }
  });
})();
</script>
</body>
</html>
