<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Expenses — Akriti Diagnostics Center</title>
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/skeleton.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <script src="/assets/js/theme.js"></script>
  <style>
    .pl-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .pl-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px 24px; }
    .pl-label { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--color-ink-muted); margin-bottom: 6px; }
    .pl-value { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--color-ink); font-variant-numeric: tabular-nums; }
    .pl-value.profit { color: var(--color-success); }
    .pl-value.loss   { color: var(--color-error); }
    @media(max-width:640px){ .pl-summary { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar"></nav>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-heading" id="topbar-title">Expenses</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" data-theme-toggle aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </header>
    <div class="offline-banner" role="status"></div>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h2 class="page-title">Expenses &amp; Profit/Loss</h2>
          <p class="page-subtitle">Track expenditures and view net profitability</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" id="add-expense-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Log Expense
          </button>
        </div>
      </div>

      <!-- Date range for P&L -->
      <div class="filters-bar" style="align-items:flex-end;margin-bottom:20px">
        <div class="form-field" style="margin:0">
          <label class="form-label">From</label>
          <input type="date" class="form-input" id="pl-from" style="height:36px;font-size:13px;width:150px">
        </div>
        <div class="form-field" style="margin:0">
          <label class="form-label">To</label>
          <input type="date" class="form-input" id="pl-to" style="height:36px;font-size:13px;width:150px">
        </div>
        <button class="btn btn-secondary btn-sm" id="pl-refresh-btn">Refresh</button>
      </div>

      <!-- P&L Summary -->
      <div class="pl-summary" id="pl-summary">
        <div class="pl-card"><div class="pl-label">Total Revenue</div><div class="skel skel-kpi" style="width:120px"></div></div>
        <div class="pl-card"><div class="pl-label">Total Expenses</div><div class="skel skel-kpi" style="width:120px"></div></div>
        <div class="pl-card"><div class="pl-label">Doctor Commissions</div><div class="skel skel-kpi" style="width:120px"></div></div>
        <div class="pl-card"><div class="pl-label">Net Profit/Loss</div><div class="skel skel-kpi" style="width:120px"></div></div>
      </div>

      <!-- Expense Filters -->
      <div class="filters-bar">
        <div class="topbar-search" style="width:220px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-expense" placeholder="Search expenses…">
        </div>
        <select class="form-select" id="filter-category" style="height:36px;min-width:140px;font-size:13px">
          <option value="">All Categories</option>
          <option value="supplies">Supplies</option>
          <option value="rent">Rent</option>
          <option value="salary">Salary</option>
          <option value="utilities">Utilities</option>
          <option value="equipment">Equipment</option>
          <option value="other">Other</option>
        </select>
        <input type="date" class="form-input" id="exp-from" style="height:36px;font-size:13px;width:140px">
        <input type="date" class="form-input" id="exp-to" style="height:36px;font-size:13px;width:140px">
      </div>

      <div id="expenses-table-container"></div>
    </main>
  </div>
</div>

<!-- Add Expense Modal -->
<div class="modal-backdrop" id="expense-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="exp-modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="exp-modal-title">Log Expense</h2>
      <button class="modal-close" id="exp-modal-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="expense-form" novalidate>
        <div class="form-row mb-4">
          <div class="form-field">
            <label class="form-label" for="exp-category">Category <span class="required">*</span></label>
            <select class="form-select" id="exp-category">
              <option value="">Select category</option>
              <option value="supplies">Supplies</option>
              <option value="rent">Rent</option>
              <option value="salary">Salary</option>
              <option value="utilities">Utilities</option>
              <option value="equipment">Equipment</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label" for="exp-date">Date <span class="required">*</span></label>
            <input class="form-input" type="date" id="exp-date">
          </div>
        </div>
        <div class="form-field mb-4">
          <label class="form-label" for="exp-description">Description <span class="required">*</span></label>
          <input class="form-input" type="text" id="exp-description" placeholder="Brief description of the expense">
        </div>
        <div class="form-row mb-4">
          <div class="form-field">
            <label class="form-label" for="exp-amount">Amount (INR) <span class="required">*</span></label>
            <input class="form-input" type="number" id="exp-amount" min="1" step="0.01" placeholder="0">
          </div>
          <div class="form-field">
            <label class="form-label" for="exp-payment-mode">Payment Mode <span class="required">*</span></label>
            <select class="form-select" id="exp-payment-mode">
              <option value="cash">Cash</option>
              <option value="upi">UPI</option>
              <option value="bank_transfer">Bank Transfer</option>
              <option value="cheque">Cheque</option>
            </select>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" for="exp-paid-to">Paid To</label>
          <input class="form-input" type="text" id="exp-paid-to" placeholder="Vendor or person name">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="exp-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="exp-save-btn">Log Expense</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/assets/js/toast.js"></script>
<script src="/assets/js/modal.js"></script>
<script src="/assets/js/cache-manager.js"></script>
<script src="/assets/js/api-client.js"></script>
<script src="/assets/js/table.js"></script>
<script src="/assets/js/shell.js"></script>
<script>
(async function() {
  await Shell.init({ role: 'admin', pageTitle: 'Expenses' });

  // Default date range: this month
  const today = new Date();
  const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  const fmtDate = d => d.toISOString().split('T')[0];
  document.getElementById('pl-from').value = fmtDate(firstDay);
  document.getElementById('pl-to').value   = fmtDate(today);
  document.getElementById('exp-date').value = fmtDate(today);

  // ── P&L Summary ───────────────────────────────────────────────────────────
  async function loadPL() {
    const from = document.getElementById('pl-from').value;
    const to   = document.getElementById('pl-to').value;
    if (!from || !to) return;
    document.getElementById('pl-summary').innerHTML = `
      <div class="pl-card"><div class="pl-label">Total Revenue</div><div class="skel skel-kpi" style="width:120px"></div></div>
      <div class="pl-card"><div class="pl-label">Total Expenses</div><div class="skel skel-kpi" style="width:120px"></div></div>
      <div class="pl-card"><div class="pl-label">Doctor Commissions</div><div class="skel skel-kpi" style="width:120px"></div></div>
      <div class="pl-card"><div class="pl-label">Net Profit/Loss</div><div class="skel skel-kpi" style="width:120px"></div></div>
    `;
    try {
      const pl = await API.get(`/api/v1/finance/profit-loss?from=${from}&to=${to}`);
      const profit = pl.net_profit;
      document.getElementById('pl-summary').innerHTML = `
        <div class="pl-card"><div class="pl-label">Total Revenue</div><div class="pl-value">${formatCurrency(pl.total_revenue)}</div></div>
        <div class="pl-card"><div class="pl-label">Total Expenses</div><div class="pl-value">${formatCurrency(pl.total_expenses)}</div></div>
        <div class="pl-card"><div class="pl-label">Doctor Commissions</div><div class="pl-value text-error">${formatCurrency(pl.total_doctor_commissions)}</div></div>
        <div class="pl-card"><div class="pl-label">Net Profit/Loss</div><div class="pl-value ${profit >= 0 ? 'profit' : 'loss'}">${formatCurrency(Math.abs(profit))} ${profit < 0 ? 'Loss' : 'Profit'}</div></div>
      `;
    } catch {
      document.getElementById('pl-summary').innerHTML = `<div class="text-muted text-sm">Failed to load P&L data.</div>`;
    }
  }
  loadPL();
  document.getElementById('pl-refresh-btn').addEventListener('click', loadPL);

  // ── Expenses Table ────────────────────────────────────────────────────────
  const table = new DataTable({
    containerId: 'expenses-table-container',
    columns: [
      { key: 'expense_date',  label: 'Date',       width: '110px', render: v => formatDate(v) },
      { key: 'category',      label: 'Category',   width: '110px', render: v => `<span class="badge badge-neutral">${escapeHtml(v)}</span>` },
      { key: 'description',   label: 'Description' },
      { key: 'paid_to',       label: 'Paid To',    width: '140px', render: v => escapeHtml(v||'—') },
      { key: 'amount',        label: 'Amount',     width: '110px', render: v => `<span class="tabular fw-600">${formatCurrency(v)}</span>` },
      { key: 'payment_mode',  label: 'Mode',       width: '100px', render: v => escapeHtml(v||'—') },
    ],
    fetchFn: async (params, options = {}) => {
      const qs = new URLSearchParams({ page: params.page, page_size: params.page_size,
        ...(params.q         && { q:         params.q }),
        ...(params.category  && { category:  params.category }),
        ...(params.date_from && { date_from: params.date_from }),
        ...(params.date_to   && { date_to:   params.date_to }),
      });
      return await API.get(`/api/v1/finance/expenses?${qs}`, { skipBackgroundRefresh: typeof options !== 'undefined' ? options.silent : false });
    },
    pageSize: 25,
    emptyMessage: 'No expenses recorded in this period',
  });
  table.load();

  let searchTimer;
  document.getElementById('search-expense').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { table.setFilter('q', e.target.value); table.load(); }, 400);
  });
  document.getElementById('filter-category').addEventListener('change', e => { table.setFilter('category', e.target.value); table.load(); });
  document.getElementById('exp-from').addEventListener('change', e => { table.setFilter('date_from', e.target.value); table.load(); });
  document.getElementById('exp-to').addEventListener('change', e => { table.setFilter('date_to', e.target.value); table.load(); });

  // ── Add Expense ───────────────────────────────────────────────────────────
  document.getElementById('add-expense-btn').addEventListener('click', () => {
    document.getElementById('expense-form').reset();
    document.getElementById('exp-date').value = fmtDate(today);
    Modal.open('expense-modal');
  });

  document.getElementById('exp-save-btn').addEventListener('click', async () => {
    const category = document.getElementById('exp-category').value;
    const desc     = document.getElementById('exp-description').value.trim();
    const amount   = parseFloat(document.getElementById('exp-amount').value);
    const mode     = document.getElementById('exp-payment-mode').value;
    const paidTo   = document.getElementById('exp-paid-to').value.trim();
    const date     = document.getElementById('exp-date').value;

    if (!category || !desc || !amount || !date) { Toast.show('Please fill all required fields', 'warning'); return; }

    const btn = document.getElementById('exp-save-btn');
    btn.setAttribute('aria-busy','true'); 
    btn.disabled = true;
    btn.innerHTML = `<span class="btn-loading-spinner"></span> Saving...`;
    try {
      await API.post('/api/v1/finance/expenses', { category, description: desc, amount, payment_mode: mode, paid_to: paidTo, expense_date: date });
      Toast.show('Expense logged', 'success');
      Modal.close('expense-modal');
      table.refresh();
      loadPL();
    } catch (err) { Toast.show(err.message || 'Failed to log expense', 'error'); }
    finally { btn.removeAttribute('aria-busy'); btn.disabled = false; btn.innerHTML = 'Log Expense'; }
  });

  document.getElementById('exp-cancel-btn').addEventListener('click', () => Modal.close('expense-modal'));
  document.getElementById('exp-modal-close').addEventListener('click', () => Modal.close('expense-modal'));
})();
</script>
</body>
</html>
