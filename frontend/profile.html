<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>My Profile — Akriti Diagnostics Center</title>
  <meta name="description" content="View and update your profile, change password">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/skeleton.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <script src="/assets/js/theme.js"></script>
  <style>
    .profile-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) { .profile-grid { grid-template-columns: 1fr; } }

    .profile-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .profile-hero {
      background: linear-gradient(135deg, var(--color-cherry-cola) 0%, #6B0001 100%);
      padding: 36px 24px 24px;
      text-align: center;
      position: relative;
    }

    .profile-avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 3px solid rgba(255,255,255,0.5);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      margin: 0 auto;
    }

    .profile-name {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .profile-role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      padding: 3px 12px;
      border-radius: var(--radius-pill);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .profile-meta {
      padding: 20px 24px;
    }

    .profile-meta-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: var(--text-sm);
    }
    .profile-meta-row:last-child { border-bottom: none; }

    .profile-meta-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--color-cherry-cola-tint-10);
      color: var(--color-cherry-cola);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .profile-meta-label {
      font-size: var(--text-xs);
      color: var(--color-ink-faint);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .profile-meta-value {
      font-weight: 500;
      color: var(--color-ink);
      word-break: break-all;
    }

    .section-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 20px;
    }

    .section-card-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-ink);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-card-title svg {
      color: var(--color-cherry-cola);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 10px;
      border-radius: var(--radius-pill);
      font-size: var(--text-xs);
      font-weight: 600;
    }
    .status-pill.active   { background: var(--color-success-tint); color: var(--color-success); }
    .status-pill.inactive { background: var(--color-error-tint);   color: var(--color-error); }

    .password-strength {
      height: 4px;
      border-radius: var(--radius-pill);
      background: var(--color-border);
      margin-top: 6px;
      overflow: hidden;
    }
    .password-strength-bar {
      height: 100%;
      border-radius: var(--radius-pill);
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar" aria-label="Main navigation"></nav>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-heading" id="topbar-title">My Profile</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" data-theme-toggle aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </header>
    <div class="offline-banner" role="status"></div>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h2 class="page-title">My Profile</h2>
          <p class="page-subtitle">Manage your account details and security settings</p>
        </div>
      </div>

      <div class="profile-grid">
        <!-- Left: Profile Card -->
        <div>
          <div class="profile-card">
            <div class="profile-hero">
              <div class="profile-avatar-wrap">
                <div class="profile-avatar" id="profile-avatar">—</div>
              </div>
              <div class="profile-name" id="profile-hero-name">Loading…</div>
              <div style="margin-top:8px">
                <span class="profile-role-badge" id="profile-hero-role">—</span>
              </div>
            </div>
            <div class="profile-meta" id="profile-meta">
              <!-- Filled by JS -->
              <div class="skel-table-row"><span class="skel skel-text skel-w-full"></span></div>
              <div class="skel-table-row"><span class="skel skel-text skel-w-20"></span></div>
              <div class="skel-table-row"><span class="skel skel-text skel-w-16"></span></div>
            </div>
          </div>
        </div>

        <!-- Right: Edit Forms -->
        <div>
          <!-- Edit Profile -->
          <div class="section-card">
            <div class="section-card-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit Profile
            </div>
            <form id="profile-form" novalidate>
              <div class="form-row mb-4">
                <div class="form-field">
                  <label class="form-label" for="edit-name">Full Name <span class="required">*</span></label>
                  <input class="form-input" type="text" id="edit-name" placeholder="Your full name">
                </div>
                <div class="form-field">
                  <label class="form-label" for="edit-mobile">Mobile Number</label>
                  <input class="form-input" type="tel" id="edit-mobile" placeholder="10-digit mobile" maxlength="10" inputmode="numeric">
                </div>
              </div>
              <div class="form-field mb-4">
                <label class="form-label" for="edit-email">Email Address</label>
                <input class="form-input" type="email" id="edit-email" disabled style="opacity:0.6;cursor:not-allowed">
                <span class="form-hint">Email cannot be changed. Contact admin if needed.</span>
              </div>
              <button type="button" class="btn btn-primary" id="save-profile-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save Changes
              </button>
            </form>
          </div>

          <!-- Change Password -->
          <div class="section-card">
            <div class="section-card-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              Change Password
            </div>
            <form id="password-form" novalidate>
              <div class="form-field mb-4">
                <label class="form-label">Verification Method</label>
                <div style="display:flex;gap:16px;margin-top:4px">
                  <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;user-select:none">
                    <input type="radio" name="verify-method" value="password" checked style="accent-color:var(--color-cherry-cola)">
                    Current Password
                  </label>
                  <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;user-select:none">
                    <input type="radio" name="verify-method" value="otp" style="accent-color:var(--color-cherry-cola)">
                    Email OTP
                  </label>
                </div>
              </div>

              <!-- Current Password Input -->
              <div class="form-field mb-4" id="current-pw-wrapper">
                <label class="form-label" for="current-pw">Current Password <span class="required">*</span></label>
                <div style="position: relative;">
                  <input class="form-input" type="password" id="current-pw" placeholder="Enter current password" autocomplete="current-password" style="padding-right: 40px;">
                  <button type="button" class="password-toggle-btn" data-target="current-pw" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 0; cursor: pointer; color: var(--color-ink-muted); display: flex; align-items: center;" aria-label="Show password">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>

              <!-- OTP Input -->
              <div class="form-field mb-4" id="otp-wrapper" style="display:none">
                <label class="form-label" for="otp-code">Email OTP Code <span class="required">*</span></label>
                <div style="display:flex;gap:8px">
                  <input class="form-input" type="text" id="otp-code" placeholder="6-digit OTP code" maxlength="6" inputmode="numeric" autocomplete="one-time-code" style="flex:1">
                  <button type="button" class="btn btn-secondary" id="request-pw-otp-btn" style="flex-shrink:0;height:36px;font-size:12px;padding:0 12px">
                    Send OTP
                  </button>
                </div>
              </div>
              <div class="form-field mb-4">
                <label class="form-label" for="new-pw">New Password <span class="required">*</span></label>
                <div style="position: relative;">
                  <input class="form-input" type="password" id="new-pw" placeholder="Min 6 chars, letter + digit" autocomplete="new-password" style="padding-right: 40px;">
                  <button type="button" class="password-toggle-btn" data-target="new-pw" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 0; cursor: pointer; color: var(--color-ink-muted); display: flex; align-items: center;" aria-label="Show password">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
                <div class="password-strength" id="pw-strength-wrap" style="margin-top: 6px;">
                  <div class="password-strength-bar" id="pw-strength-bar"></div>
                </div>
                <span class="form-hint" id="pw-strength-label">Enter a password</span>
              </div>
              <div class="form-field mb-6">
                <label class="form-label" for="confirm-pw">Confirm New Password <span class="required">*</span></label>
                <div style="position: relative;">
                  <input class="form-input" type="password" id="confirm-pw" placeholder="Repeat new password" autocomplete="new-password" style="padding-right: 40px;">
                  <button type="button" class="password-toggle-btn" data-target="confirm-pw" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 0; cursor: pointer; color: var(--color-ink-muted); display: flex; align-items: center;" aria-label="Show password">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
              <button type="button" class="btn btn-primary" id="change-pw-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Update Password
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="/assets/js/toast.js"></script>
<script src="/assets/js/modal.js"></script>
<script src="/assets/js/cache-manager.js"></script>
<script src="/assets/js/api-client.js"></script>
<script src="/assets/js/shell.js"></script>
<script>
(async function () {
  const me = await Shell.init({ pageTitle: 'My Profile' });
  if (!me) return;

  // ── Populate hero & meta ───────────────────────────────────────────────────
  const initials = (me.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  document.getElementById('profile-avatar').textContent = initials;
  document.getElementById('profile-hero-name').textContent = me.name || '—';
  document.getElementById('profile-hero-role').textContent = me.role === 'admin' ? '👑 Administrator' : '🧑‍⚕️ Staff';

  // Fill meta section
  document.getElementById('profile-meta').innerHTML = `
    <div class="profile-meta-row">
      <div class="profile-meta-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div>
        <div class="profile-meta-label">Full Name</div>
        <div class="profile-meta-value">${escapeHtml(me.name || '—')}</div>
      </div>
    </div>
    <div class="profile-meta-row">
      <div class="profile-meta-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div>
        <div class="profile-meta-label">Email</div>
        <div class="profile-meta-value">${escapeHtml(me.email || '—')}</div>
      </div>
    </div>
    <div class="profile-meta-row">
      <div class="profile-meta-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.79 19.79 19.79 0 011.1 1.16 2 2 0 013.09 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>
      </div>
      <div>
        <div class="profile-meta-label">Mobile</div>
        <div class="profile-meta-value">${escapeHtml(me.mobile || '—')}</div>
      </div>
    </div>
    <div class="profile-meta-row">
      <div class="profile-meta-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/></svg>
      </div>
      <div>
        <div class="profile-meta-label">Role</div>
        <div class="profile-meta-value" style="text-transform:capitalize">${escapeHtml(me.role || '—')}</div>
      </div>
    </div>
    <div class="profile-meta-row">
      <div class="profile-meta-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div>
        <div class="profile-meta-label">Account Status</div>
        <div>
          <span class="status-pill ${me.is_active ? 'active' : 'inactive'}">
            ${me.is_active ? '● Active' : '● Inactive'}
          </span>
        </div>
      </div>
    </div>
    ${me.created_at ? `
    <div class="profile-meta-row">
      <div class="profile-meta-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div>
        <div class="profile-meta-label">Member Since</div>
        <div class="profile-meta-value">${formatDate(me.created_at)}</div>
      </div>
    </div>` : ''}
  `;

  // ── Pre-fill edit form ─────────────────────────────────────────────────────
  document.getElementById('edit-name').value   = me.name  || '';
  document.getElementById('edit-email').value  = me.email || '';
  document.getElementById('edit-mobile').value = me.mobile || '';

  // ── Save Profile ───────────────────────────────────────────────────────────
  document.getElementById('save-profile-btn').addEventListener('click', async () => {
    const name   = document.getElementById('edit-name').value.trim();
    const mobile = document.getElementById('edit-mobile').value.trim();
    if (!name) { Toast.show('Name is required', 'warning'); return; }
    if (mobile && !/^[6-9]\d{9}$/.test(mobile)) { Toast.show('Enter a valid 10-digit mobile number', 'error'); return; }

    const btn = document.getElementById('save-profile-btn');
    btn.setAttribute('aria-busy', 'true');
    btn.innerHTML = `<span class="btn-loading-spinner"></span> Saving…`;

    try {
      const updated = await API.patch('/api/v1/auth/me/profile', { name, mobile: mobile || undefined });
      // Refresh sidebar avatar
      const av = document.getElementById('profile-avatar');
      if (av) av.textContent = (updated.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('profile-hero-name').textContent = updated.name || '—';
      Toast.show('Profile updated successfully', 'success');
    } catch (err) {
      Toast.show(err.message || 'Failed to update profile', 'error');
    } finally {
      btn.removeAttribute('aria-busy');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Changes`;
    }
  });

  // ── Password strength indicator ────────────────────────────────────────────
  document.getElementById('new-pw').addEventListener('input', e => {
    const pw = e.target.value;
    const bar = document.getElementById('pw-strength-bar');
    const lbl = document.getElementById('pw-strength-label');
    if (!pw) { bar.style.width = '0%'; lbl.textContent = 'Enter a password'; return; }
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/\d/.test(pw))    score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const colors = ['#9A0002','#B8792D','#B8792D','#3F7D58','#3F7D58'];
    const labels = ['Too short','Weak','Fair','Good','Strong'];
    bar.style.width  = (score * 20) + '%';
    bar.style.background = colors[score - 1] || '#9A0002';
    lbl.textContent = labels[score - 1] || 'Too short';
  });

  // ── Change Password ────────────────────────────────────────────────────────
  const verifyRadios = document.querySelectorAll('input[name="verify-method"]');
  const currentPwWrapper = document.getElementById('current-pw-wrapper');
  const otpWrapper = document.getElementById('otp-wrapper');
  const requestPwOtpBtn = document.getElementById('request-pw-otp-btn');

  verifyRadios.forEach(radio => {
    radio.addEventListener('change', () => {
      if (radio.value === 'password') {
        currentPwWrapper.style.display = 'block';
        otpWrapper.style.display = 'none';
      } else {
        currentPwWrapper.style.display = 'none';
        otpWrapper.style.display = 'block';
      }
    });
  });

  requestPwOtpBtn.addEventListener('click', async () => {
    requestPwOtpBtn.setAttribute('aria-busy', 'true');
    requestPwOtpBtn.textContent = 'Sending...';
    try {
      await API.post('/api/v1/auth/otp/request', { email: me.email, purpose: 'password_change' });
      Toast.show('OTP code sent to your registered email', 'success');
    } catch (err) {
      Toast.show(err.message || 'Failed to send OTP', 'error');
    } finally {
      requestPwOtpBtn.removeAttribute('aria-busy');
      requestPwOtpBtn.textContent = 'Send OTP';
    }
  });

  document.getElementById('change-pw-btn').addEventListener('click', async () => {
    const method    = document.querySelector('input[name="verify-method"]:checked').value;
    const currentPw = document.getElementById('current-pw').value.trim();
    const otpCode   = document.getElementById('otp-code').value.trim();
    const newPw     = document.getElementById('new-pw').value;
    const confirmPw = document.getElementById('confirm-pw').value;

    if (method === 'password' && !currentPw) { Toast.show('Current password is required', 'warning'); return; }
    if (method === 'otp' && !otpCode)        { Toast.show('OTP verification code is required', 'warning'); return; }
    if (!newPw || !confirmPw)                { Toast.show('New password fields are required', 'warning'); return; }
    if (newPw !== confirmPw)                 { Toast.show('New passwords do not match', 'error'); return; }
    if (newPw.length < 6 || newPw.length > 13) { Toast.show('Password must be between 6 and 13 characters', 'error'); return; }
    if (!/[A-Za-z]/.test(newPw) || !/\d/.test(newPw)) {
      Toast.show('Password must contain at least one letter and one digit', 'error'); return;
    }

    const btn = document.getElementById('change-pw-btn');
    btn.setAttribute('aria-busy', 'true');
    btn.innerHTML = `<span class="btn-loading-spinner"></span> Updating…`;

    const payload = { new_password: newPw };
    if (method === 'password') {
      payload.current_password = currentPw;
    } else {
      payload.otp_code = otpCode;
    }

    try {
      await API.post('/api/v1/auth/me/change-password', payload);
      document.getElementById('password-form').reset();
      document.getElementById('pw-strength-bar').style.width = '0%';
      document.getElementById('pw-strength-label').textContent = 'Enter a password';
      
      // Reset inputs visibility
      currentPwWrapper.style.display = 'block';
      otpWrapper.style.display = 'none';
      document.querySelector('input[name="verify-method"][value="password"]').checked = true;

      Toast.show('Password changed successfully', 'success');
    } catch (err) {
      Toast.show(err.message || 'Failed to change password', 'error');
    } finally {
      btn.removeAttribute('aria-busy');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Update Password`;
    }
  });
})();
</script>
</body>
</html>
