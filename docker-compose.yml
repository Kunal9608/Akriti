services:
  db:
    image: ankane/pgvector:latest
    container_name: akriti_postgres_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: akriti_lab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d akriti_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akriti_redis_cache
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akriti_web_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/akriti_lab}
      - REDIS_URL=redis://redis:6379/0
      - DISABLE_PGVECTOR=${DISABLE_PGVECTOR:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-57845123654897420132565107498514}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - WORKERS=${WORKERS:-2}
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - .:/app
      - /app/venv/
      - /app/.venv/
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local
